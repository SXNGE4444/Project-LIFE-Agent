# Dark Patterns Taxonomy

This file contains a list of dark patterns according to the taxonomy established by various organizations.

### Types of Dark Patterns

1. **Bait and Switch**: A user sets out to do one thing but a different, often undesirable, action is taken instead.
2. **Roach Motel**: Getting into a situation is easy, but getting out of it is difficult.
3. **Confirmshaming**: Guilt tripping the user into opting into something.
4. **Hidden Costs**: Extra charges that are not clearly disclosed.
5. **Privacy Zuckering**: This occurs when a user is tricked into publicly sharing personal information.

